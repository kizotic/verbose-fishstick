hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 90

service:
  type: ClusterIP   # Changed from NodePort
  port: 80          # The port the Ingress Controller will talk to internally
  targetPort: 3000  # The actual port nodejsapp container listens on

