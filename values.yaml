gateway:
  enabled: true
  gatewayClassName: "envoy"
  hosts:
    - "kizotick.cc"
    - "www.kizotick.cc"
  tlsSecretName: "cloudflare-origin-tls"
  tls:
    certFile: "certs/cloudflare.crt"
    keyFile: "certs/cloudflare.pem"

image:
  repository: "ghcr.io/kizotic/nodejsapp"
  tag: latest
  pullSecretName: ghcr-secret

